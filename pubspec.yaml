name: gestia
description: Gestión de cuentas por pagar — Gestia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  intl: ^0.20.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#0B1437"
  image: assets/logo.png
  android: true
  ios: true
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/
